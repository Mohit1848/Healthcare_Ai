apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: healthcare-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: healthcare-ai/backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: openai-secret
          env:
            - name: MONGODB_URI
              value: mongodb://mongodb:27017/healthcare_ai
            - name: VECTOR_SERVICE_URL
              value: http://vector-service:8001/search
            - name: OPENAI_MODEL
              value: gpt-4o-mini
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: healthcare-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

