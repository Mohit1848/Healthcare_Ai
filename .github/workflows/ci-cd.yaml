name: Healthcare AI CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend
        run: docker build -t healthcare-ai/backend:${{ github.sha }} ./backend
      - name: Build vector service
        run: docker build -t healthcare-ai/vector-service:${{ github.sha }} ./vector-service
      - name: Build frontend
        run: docker build -t healthcare-ai/frontend:${{ github.sha }} ./frontend

  kind-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
        with:
          cluster_name: healthcare-ai
          config: infra/kind/cluster.yaml
      - name: Build and load local images
        run: |
          docker build -t healthcare-ai/backend:local ./backend
          docker build -t healthcare-ai/vector-service:local ./vector-service
          docker build -t healthcare-ai/frontend:local ./frontend
          kind load docker-image healthcare-ai/backend:local --name healthcare-ai
          kind load docker-image healthcare-ai/vector-service:local --name healthcare-ai
          kind load docker-image healthcare-ai/frontend:local --name healthcare-ai
      - name: Deploy manifests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          kubectl apply -f k8s/base/namespace.yaml
          kubectl -n healthcare-ai create secret generic openai-secret --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY:-dummy}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s/base
          kubectl apply -k monitoring
          kubectl -n healthcare-ai rollout status deployment/backend --timeout=180s

