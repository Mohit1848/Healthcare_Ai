apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: healthcare-ai
        orgId: 1
        folder: Healthcare AI
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-ai-dashboard
  namespace: monitoring
data:
  healthcare-ai.json: |
    {
      "title": "Healthcare AI Triage Assistant",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {"type":"stat","title":"Chatbot Uptime","gridPos":{"x":0,"y":0,"w":6,"h":4},"targets":[{"expr":"up{app=\"backend\"}"}]},
        {"type":"timeseries","title":"API Latency p95","gridPos":{"x":6,"y":0,"w":9,"h":4},"targets":[{"expr":"histogram_quantile(0.95, sum(rate(backend_api_latency_seconds_bucket[5m])) by (le, endpoint))"}]},
        {"type":"timeseries","title":"Request Count","gridPos":{"x":15,"y":0,"w":9,"h":4},"targets":[{"expr":"sum(rate(backend_request_count[1m])) by (endpoint)"}]},
        {"type":"stat","title":"OpenAI Failures","gridPos":{"x":0,"y":4,"w":6,"h":4},"targets":[{"expr":"sum(increase(openai_api_failures_total[15m]))"}]},
        {"type":"timeseries","title":"OpenAI Requests","gridPos":{"x":6,"y":4,"w":9,"h":4},"targets":[{"expr":"sum(rate(openai_requests_total[5m]))"}]},
        {"type":"timeseries","title":"RAG Retrieval Latency p95","gridPos":{"x":15,"y":4,"w":9,"h":4},"targets":[{"expr":"histogram_quantile(0.95, sum(rate(rag_retrieval_latency_seconds_bucket[5m])) by (le))"}]},
        {"type":"stat","title":"Active Sessions","gridPos":{"x":0,"y":8,"w":6,"h":4},"targets":[{"expr":"active_sessions"}]},
        {"type":"timeseries","title":"Vector Search Latency p95","gridPos":{"x":6,"y":8,"w":9,"h":4},"targets":[{"expr":"histogram_quantile(0.95, sum(rate(vector_search_latency_seconds_bucket[5m])) by (le))"}]},
        {"type":"stat","title":"Pod Health","gridPos":{"x":15,"y":8,"w":9,"h":4},"targets":[{"expr":"sum(up{namespace=\"healthcare-ai\"}) by (app)"}]},
        {"type":"timeseries","title":"Backend CPU","gridPos":{"x":0,"y":12,"w":12,"h":4},"targets":[{"expr":"sum(rate(container_cpu_usage_seconds_total{namespace=\"healthcare-ai\",pod=~\"backend-.*\",container=\"backend\"}[5m]))"}]},
        {"type":"timeseries","title":"Backend Memory","gridPos":{"x":12,"y":12,"w":12,"h":4},"targets":[{"expr":"sum(container_memory_working_set_bytes{namespace=\"healthcare-ai\",pod=~\"backend-.*\",container=\"backend\"})"}]}
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard
          configMap:
            name: healthcare-ai-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30081
